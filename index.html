function esc(s) { return String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function render() {
  const root = document.getElementById('cases');
  root.innerHTML = rows.map((r, i) => `
    <section class="case">
      <div class="meta"><b>${i+1}/${rows.length}</b> &middot; ${esc(r.scenario_id)} &middot; ${esc(r.repo)} &middot; ${esc(r.instance_id)}</div>
      <h3>中文中立版</h3>
      <pre class="zh">${esc(r.neutral_chinese_view)}</pre>
      <div class="action"><b>真实轨迹里的下一步：</b> command = <code>${esc(r.observed_command)}</code> / path = <code>${esc(r.observed_path)}</code></div>
      <details>
        <summary>展开原始英文证据</summary>
        <pre class="raw">${esc(r.prefix_evidence)}</pre>
      </details>
      <div style="margin-top: 10px;">
        <label><input type="radio" name="label_${i}" value="UNIQUE" onchange="save(${i})"> UNIQUE</label>
        <label><input type="radio" name="label_${i}" value="ALT" onchange="save(${i})"> ALT</label>
        <label><input type="radio" name="label_${i}" value="UNCLEAR" onchange="save(${i})"> UNCLEAR</label>
        <label>Confidence
          <select id="conf_${i}" onchange="save(${i})">
            <option value=""></option><option>1</option><option>2</option><option>3</option>
          </select>
        </label>
      </div>
      <textarea id="note_${i}" placeholder="一句短理由，例如：recent reasoning 明确指向该文件 / 多个测试文件都合理 / 信息不够" oninput="save(${i})"></textarea>
    </section>`).join('');
  load();
  updateProgress();
}
function save(i) {
  const picked = document.querySelector(`input[name=label_${i}]:checked`);
  rows[i].human_label = picked ? picked.value : '';
  rows[i].human_confidence = document.getElementById(`conf_${i}`).value;
  rows[i].human_note = document.getElementById(`note_${i}`).value;
  localStorage.setItem('statebind_v77_rows', JSON.stringify(rows));
  updateProgress();
}
function load() {
  const saved = localStorage.getItem('statebind_v77_rows');
  if (!saved) return;
  const old = JSON.parse(saved);
  for (let i=0; i<Math.min(old.length, rows.length); i++) {
    rows[i].human_label = old[i].human_label || rows[i].human_label || '';
    rows[i].human_confidence = old[i].human_confidence || rows[i].human_confidence || '';
    rows[i].human_note = old[i].human_note || rows[i].human_note || '';
    if (rows[i].human_label) {
      const el = document.querySelector(`input[name=label_${i}][value=${rows[i].human_label}]`);
      if (el) el.checked = true;
    }
    document.getElementById(`conf_${i}`).value = rows[i].human_confidence || '';
    document.getElementById(`note_${i}`).value = rows[i].human_note || '';
  }
}
function updateProgress() {
  const done = rows.filter(r => r.human_label && r.human_confidence).length;
  document.getElementById('progress').textContent = `Annotated ${done} / ${rows.length}`;
}
function tsvCell(s) { return String(s ?? '').replace(/\t/g, ' ').replace(/\r?\n/g, ' '); }
function renderOutput() {
  const fields = ['scenario_id','repo','instance_id','prefix_evidence','observed_command','observed_path','human_label','human_confidence','human_note'];
  const lines = [fields.join('\t')];
  for (const r of rows) lines.push(fields.map(f => tsvCell(r[f])).join('\t'));
  document.getElementById('out').value = lines.join('\n') + '\n';
}
render();
</script>
